name: Deploy to OCI (MSA)

on:
  repository_dispatch:
    types: [update-image]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3 # [수정] 버전 고정 (보안)
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          timeout: 180s
          script: |
            # 1. 입력값 검증
            SERVICE_NAME="${{ github.event.client_payload.service_name }}"
            IMAGE_URL="${{ github.event.client_payload.image_url }}"
            IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
            
            if [[ ! "$SERVICE_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "❌ Error: Invalid Service Name"
              exit 1
            fi
            
            if [[ ! "$IMAGE_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
               echo "❌ Error: Invalid Image Tag"
               exit 1
            fi
            
            # [추가] 이미지 URL 검증 (도메인, 경로, 하이픈, 언더바, 점, 콜론, 슬래시 허용)
            if [[ ! "$IMAGE_URL" =~ ^[a-zA-Z0-9._:/-]+$ ]]; then
               echo "❌ Error: Invalid Image URL"
               exit 1
            fi
            
            echo "🚀 Start Deploy: $SERVICE_NAME ($IMAGE_URL:$IMAGE_TAG)"
            
            mkdir -p ~/app/nginx/conf.d && cd ~/app
            
            # 2. docker-compose.yml 생성
            # [수정] Linux에서 host.docker.internal 사용을 위한 extra_hosts 추가
            cat <<EOF > docker-compose.yml
            version: '3.8'
            
            services:
              # [0] Nginx
              nginx:
                image: nginx:latest
                container_name: nginx
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d
                restart: always
                networks:
                  - msa-network

              # [1] Gateway - Blue
              gateway-blue:
                image: ghcr.io/final-project-gilmok/gateway-repo:\${GATEWAY_TAG:-latest}
                container_name: gateway-blue
                environment:
                  - SERVER_PORT=8080
                  - SPRING_PROFILES_ACTIVE=prod
                  - API_SERVER_URL=http://api-server:8080
                  - AUTH_SERVER_URL=http://auth-server:9000
                extra_hosts: # Prometheus가 호스트를 찾을 수 있게 추가
                  - "host.docker.internal:host-gateway"
                networks:
                  - msa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 3

              # [1] Gateway - Green
              gateway-green:
                image: ghcr.io/final-project-gilmok/gateway-repo:\${GATEWAY_TAG:-latest}
                container_name: gateway-green
                environment:
                  - SERVER_PORT=8080
                  - SPRING_PROFILES_ACTIVE=prod
                  - API_SERVER_URL=http://api-server:8080
                  - AUTH_SERVER_URL=http://auth-server:9000
                extra_hosts: # Prometheus가 호스트를 찾을 수 있게 추가
                  - "host.docker.internal:host-gateway"
                networks:
                  - msa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 3

              # [2] API 서버
              api-server:
                image: ghcr.io/final-project-gilmok/api-repo:latest
                container_name: api-server
                expose:
                  - "8080"
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                networks:
                  - msa-network

              # [3] 인증 서버
              auth-server:
                image: ghcr.io/final-project-gilmok/auth-repo:latest
                container_name: auth-server
                expose:
                  - "9000"
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                networks:
                  - msa-network

              # [4] Redis
              redis:
                image: redis:alpine
                container_name: redis-server
                expose:
                  - "6379"
                networks:
                  - msa-network

              # [5] MySQL
              mysql:
                image: mysql:8.0
                container_name: mysql-server
                expose:
                  - "3306"
                environment:
                  MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
                  MYSQL_DATABASE: gilmok_db
                  TZ: Asia/Seoul
                volumes:
                  - ./mysql-data:/var/lib/mysql
                  - ./mysql-conf:/etc/mysql/conf.d
                  - ./mysql-init:/docker-entrypoint-initdb.d
                command: >
                  --character-set-server=utf8mb4 
                  --collation-server=utf8mb4_unicode_ci 
                  --default-time-zone='+09:00'
                  --max_connections=150
                  --innodb_buffer_pool_size=512M 
                deploy:
                  resources:
                    limits:
                      memory: 1G
                networks:
                  - msa-network

            networks:
              msa-network:
                driver: bridge
            EOF

            # .env 생성
            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
                echo "GATEWAY_TAG=$IMAGE_TAG" > .env
            else
                echo "GATEWAY_TAG=latest" > .env
            fi
            
            if command -v docker-compose &> /dev/null; then
                DOCKER_COMPOSE="docker-compose"
            else
                DOCKER_COMPOSE="docker compose"
            fi

            # 3. 배포 로직 분기
            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
                echo "🔵 Gateway Service Detected -> Starting Blue/Green Deployment..."
            
                # (1) 현재 활성 컬러 확인 [수정: grep -q 사용]
                if sudo docker ps --format '{{.Names}}' | grep -q "gateway-blue"; then
                    CURRENT_COLOR="blue"
                    TARGET_COLOR="green"
                else
                    CURRENT_COLOR="green"
                    TARGET_COLOR="blue"
                fi
                echo "Current: $CURRENT_COLOR / Target: $TARGET_COLOR"
            
                # (2) Target 배포 시작
                sudo $DOCKER_COMPOSE pull gateway-$TARGET_COLOR
                sudo $DOCKER_COMPOSE up -d gateway-$TARGET_COLOR
            
                # (3) Real Health Check
                echo "Waiting for Health Check..."
                for i in {1..12}; do
                    # [수정] 컨테이너 내부 헬스체크 상태 확인 (포트 미노출 대응)
                    if [ "$(sudo docker inspect --format='{{.State.Health.Status}}' gateway-$TARGET_COLOR)" == "healthy" ]; then
                        echo "✅ Health Check Passed!"
                        break
                    fi
            
                    if [ "$i" == "12" ]; then
                        echo "❌ Health Check Failed! Aborting..."
                        sudo $DOCKER_COMPOSE stop gateway-$TARGET_COLOR
                        exit 1
                    fi
                    echo "Checking... ($i/12)"
                    sleep 5
                done
            
                # (4) Nginx 트래픽 전환
                echo "Switching Traffic to $TARGET_COLOR..."
                cat <<NGINX_CONF > ./nginx/conf.d/default.conf
                upstream gateway_backend {
                    server gateway-$TARGET_COLOR:8080;
                }
                server {
                    listen 80;
                    location / {
                        proxy_pass http://gateway_backend;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    }
                }
                NGINX_CONF
            
                # Nginx Reload [수정: grep -q 사용]
                if sudo docker ps --format '{{.Names}}' | grep -q "nginx"; then
                    sudo docker exec nginx nginx -s reload
                else
                    sudo $DOCKER_COMPOSE up -d nginx
                fi
            
                # (5) 이전 버전 중지
                echo "Stopping Old Version ($CURRENT_COLOR)..."
                sudo $DOCKER_COMPOSE stop gateway-$CURRENT_COLOR
            
            else
                echo "🟢 Standard Deployment for $SERVICE_NAME..."
                sudo $DOCKER_COMPOSE pull $SERVICE_NAME
                sudo $DOCKER_COMPOSE up -d $SERVICE_NAME --remove-orphans
            fi
            
            sudo docker image prune -f
            echo "✨ All Done!"
