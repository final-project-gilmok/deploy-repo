name: Deploy to OCI (MSA)

on:
  repository_dispatch:
    types: [update-image]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Copy Monitoring Configs to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: "monitoring/"
          target: "~/app"

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          timeout: 180s
          envs: GRAFANA_PASSWORD,FRONTEND_URL
          script: |
            SERVICE_NAME="${{ github.event.client_payload.service_name }}"
            IMAGE_URL="${{ github.event.client_payload.image_url }}"
            IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
            
            if [[ ! "$SERVICE_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "❌ Error: Invalid Service Name"
              exit 1
            fi
            
            if [[ ! "$IMAGE_URL" =~ ^[a-zA-Z0-9._:/-]+$ ]]; then
               echo "❌ Error: Invalid Image URL"
               exit 1
            fi
            
            if [[ ! "$IMAGE_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
               echo "❌ Error: Invalid Image Tag"
               exit 1
            fi

            if [[ -z "$FRONTEND_URL" ]]; then
                echo "❌ Error: FRONTEND_URL is empty"
                exit 1
            fi

            echo "🚀 Start Deploy: $SERVICE_NAME ($IMAGE_URL:$IMAGE_TAG)"
            
            mkdir -p ~/app/nginx/conf.d && cd ~/app
            
            # ⭐️ [리뷰 반영] Nginx 초기 설정 파일이 없으면 기본값(blue 기준)으로 생성
            # (Gateway 외의 서비스가 먼저 배포되더라도 Nginx가 정상적으로 뜰 수 있도록 보장)
            if [ ! -f ./nginx/conf.d/default.conf ]; then
                echo "⚙️ Creating initial Nginx config..."
                cat <<NGINX_CONF > ./nginx/conf.d/default.conf
                upstream gateway_backend {
                    server gateway-blue:8080;
                }
                server {
                    listen 80;
                    location / {
                        proxy_pass http://gateway_backend;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    }
                    location /grafana/ {
                        proxy_pass http://grafana:3000/;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    }
                }
            NGINX_CONF
            fi
            
            echo "🌐 Ensuring docker network 'msa-network' exists..."
            sudo docker network create msa-network || true
            
            # --- [1] 모니터링 시스템 실행 ---
            echo "📊 Starting Monitoring System..."
            if [ -d "./monitoring" ]; then
                cd monitoring
                if [ -f "docker-compose.monitoring.prod.yml" ]; then
                    if command -v docker-compose &> /dev/null; then
                        GRAFANA_PASSWORD="$GRAFANA_PASSWORD" docker-compose -f docker-compose.monitoring.prod.yml up -d
                    else
                        GRAFANA_PASSWORD="$GRAFANA_PASSWORD" docker compose -f docker-compose.monitoring.prod.yml up -d
                    fi
                elif [ -f "docker-compose.monitoring.yml" ]; then
                    if command -v docker-compose &> /dev/null; then
                        docker-compose -f docker-compose.monitoring.yml up -d
                    else
                        docker compose -f docker-compose.monitoring.yml up -d
                    fi
                fi
                cd ..
            else
                echo "⚠️ Warning: monitoring folder not found. Skipping monitoring setup."
            fi

            # --- [2] 메인 서비스 docker-compose.yml 생성 ---
            cat <<'EOF' > docker-compose.yml
            version: '3.8'
            
            services:
              nginx:
                image: nginx:1.25.4-alpine
                container_name: nginx
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d
                restart: always
                networks:
                  - msa-network

              gateway-blue:
                image: ghcr.io/final-project-gilmok/gateway-repo:${GATEWAY_TAG:-latest}
                container_name: gateway-blue
                environment:
                  - SERVER_PORT=8080
                  - SPRING_PROFILES_ACTIVE=prod
                  - API_SERVER_URL=http://api-server:8080
                  - AUTH_SERVER_URL=http://auth-server:9000
                  - FRONTEND_URL=${FRONTEND_URL}
                  - SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
                  - SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
                  - SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }}
                  - SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }}
                  - SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
                  - SPRING_DATA_REDIS_SSL_ENABLED=true
                extra_hosts: 
                  - "host.docker.internal:host-gateway"
                networks:
                  - msa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 3

              gateway-green:
                image: ghcr.io/final-project-gilmok/gateway-repo:${GATEWAY_TAG:-latest}
                container_name: gateway-green
                environment:
                  - SERVER_PORT=8080
                  - SPRING_PROFILES_ACTIVE=prod
                  - API_SERVER_URL=http://api-server:8080
                  - AUTH_SERVER_URL=http://auth-server:9000
                  - FRONTEND_URL=${FRONTEND_URL}
                  - SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
                  - SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
                  - SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }}
                  - SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }}
                  - SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
                  - SPRING_DATA_REDIS_SSL_ENABLED=true
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                networks:
                  - msa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
                  interval: 10s
                  timeout: 5s
                  retries: 3

              api-server:
                image: ghcr.io/final-project-gilmok/api-repo:latest
                container_name: api-server
                expose:
                  - "8080"
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                  - SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
                  - SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
                  - SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }}
                  - SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }}
                  - SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
                  - SPRING_DATA_REDIS_SSL_ENABLED=true
                networks:
                  - msa-network

              auth-server:
                image: ghcr.io/final-project-gilmok/auth-repo:latest
                container_name: auth-server
                expose:
                  - "9000"
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                  - SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
                  - SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
                  - SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }}
                  - SPRING_DATA_REDIS_PORT=${{ secrets.REDIS_PORT }}
                  - SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
                  - SPRING_DATA_REDIS_SSL_ENABLED=true
                networks:
                  - msa-network

            # ⭐️ [리뷰 반영] driver: bridge 대신 external: true 명시
            networks:
              msa-network:
                external: true
            EOF

            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
                echo "GATEWAY_TAG=$IMAGE_TAG" > .env
            else
                echo "GATEWAY_TAG=latest" > .env
            fi
            
            echo "FRONTEND_URL=$FRONTEND_URL" >> .env
            
            if command -v docker-compose &> /dev/null; then
                DOCKER_COMPOSE="docker-compose"
            else
                DOCKER_COMPOSE="docker compose"
            fi

            # --- [3] 배포 로직 분기 ---
            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
                echo "🔵 Gateway Service Detected -> Starting Blue/Green Deployment..."
            
                if sudo docker ps --format '{{.Names}}' | grep -q "gateway-blue"; then
                    CURRENT_COLOR="blue"
                    TARGET_COLOR="green"
                else
                    CURRENT_COLOR="green"
                    TARGET_COLOR="blue"
                fi
                echo "Current: $CURRENT_COLOR / Target: $TARGET_COLOR"
            
                sudo $DOCKER_COMPOSE pull gateway-$TARGET_COLOR
                sudo $DOCKER_COMPOSE up -d gateway-$TARGET_COLOR
            
                echo "Waiting for Health Check..."
                for i in {1..12}; do
                    if [ "$(sudo docker inspect --format='{{.State.Health.Status}}' gateway-$TARGET_COLOR)" == "healthy" ]; then
                        echo "✅ Health Check Passed!"
                        break
                    fi
            
                    if [ "$i" == "12" ]; then
                        echo "❌ Health Check Failed! Aborting..."
                        sudo $DOCKER_COMPOSE stop gateway-$TARGET_COLOR
                        exit 1
                    fi
                    echo "Checking... ($i/12)"
                    sleep 5
                done
            
                echo "Switching Traffic to $TARGET_COLOR..."
                cat <<NGINX_CONF > ./nginx/conf.d/default.conf
                upstream gateway_backend {
                    server gateway-$TARGET_COLOR:8080;
                }
            
                server {
                    listen 80;
                    location / {
                        proxy_pass http://gateway_backend;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    }
                    location /grafana/ {
                        proxy_pass http://grafana:3000/;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    }
                }
                NGINX_CONF
            
                if sudo docker ps --format '{{.Names}}' | grep -q "nginx"; then
                    sudo docker exec nginx nginx -s reload
                else
                    sudo $DOCKER_COMPOSE up -d nginx
                fi
            
                echo "Stopping Old Version ($CURRENT_COLOR)..."
                sudo $DOCKER_COMPOSE stop gateway-$CURRENT_COLOR
            
            else
                echo "🟢 Standard Deployment for $SERVICE_NAME..."
                sudo $DOCKER_COMPOSE pull $SERVICE_NAME
                sudo $DOCKER_COMPOSE up -d $SERVICE_NAME --remove-orphans
            
                # ⭐️ [리뷰 반영] api-server 등 일반 서비스 배포 시에도 Nginx가 꺼져있으면 띄우도록 보완
                if ! sudo docker ps --format '{{.Names}}' | grep -q "nginx"; then
                    sudo $DOCKER_COMPOSE up -d nginx
                fi
            fi
            
            sudo docker image prune -f
            echo "✨ All Done!"
