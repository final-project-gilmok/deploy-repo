name: Deploy to OCI (MSA)

on:
  repository_dispatch:
    types: [update-image]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          timeout: 40s
          script: |
            # 1. 정보 받기
            SERVICE_NAME="${{ github.event.client_payload.service_name }}"
            IMAGE_URL="${{ github.event.client_payload.image_url }}"
            IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
            
            # 방어 코드
            if [ -z "$SERVICE_NAME" ]; then
              echo "❌ 서비스 이름이 없습니다! 배포를 중단합니다."
              exit 1
            fi
            
            echo "🚀 배포 시작: $SERVICE_NAME ($IMAGE_URL:$IMAGE_TAG)"
            
            mkdir -p ~/app && cd ~/app
            
            # 2. docker-compose.yml 생성 (전체 구조 정의)
            # 주의: 여기서 정의한 image 주소는 각 repo의 workflow 파일과 일치해야 합니다.
            cat <<EOF > docker-compose.yml
            version: '3.8'
            
            services:
              # [1] API 서버
              api-server:
                image: ghcr.io/Final-project-gilmok/api-repo:latest
                container_name: api-server
                ports:
                  - "8081:8080" # 외부포트:내부포트 (충돌 방지 위해 8081 권장)
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                networks:
                  - msa-network

              # [2] 인증 서버 (Auth)
              auth-server:
                image: ghcr.io/Final-project-gilmok/auth-repo:latest
                container_name: auth-server
                ports:
                  - "9000:9000"
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                networks:
                  - msa-network

              # [3] 게이트웨이 서버 (Gateway) - 사용자가 접속하는 입구
              gateway-server:
                image: ghcr.io/Final-project-gilmok/gateway-repo:latest
                container_name: gateway-server
                ports:
                  - "80:8000" # 사용자는 80(http)으로 들어와서 8000으로 연결
                restart: always
                environment:
                  - TZ=Asia/Seoul
                  - SPRING_PROFILES_ACTIVE=prod
                  # 게이트웨이가 다른 서버 주소를 알기 위한 설정
                  - API_SERVER_URL=http://api-server:8080
                  - AUTH_SERVER_URL=http://auth-server:9000
                networks:
                  - msa-network
            
              # [4] Redis (대기열용)
              redis:
                image: redis:alpine
                container_name: redis-server
                ports:
                  - "6379:6379"
                networks:
                  - msa-network

               # [5] MySQL (메인 DB)
              mysql:
                image: mysql:8.0
                container_name: mysql-server
                ports:
                  - "3306:3306"
                environment:
                  # [보안] GitHub Actions Secret에서 주입받은 값 사용
                  MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
                  MYSQL_DATABASE: gilmok_db  # 실제 사용할 DB 이름으로 수정!
                  TZ: Asia/Seoul
                volumes:
                  # [데이터 보존] 호스트와 연결 (필수)
                  - ./mysql-data:/var/lib/mysql
                  # [커스텀 설정] my.cnf 파일을 밖에서 주입해서 설정 제어
                  - ./mysql-conf:/etc/mysql/conf.d 
                  - ./mysql-init:/docker-entrypoint-initdb.d
            
                # [설정 최적화 & 제약 조건]
                # 관리형 DB가 해주던 걸 우리가 직접 설정하는 부분입니다.
                command: >
                  --character-set-server=utf8mb4 
                  --collation-server=utf8mb4_unicode_ci 
                  --default-time-zone='+09:00'
                  --max_connections=150
                  --innodb_buffer_pool_size=512M 
                  --lower_case_table_names=1
            
                # [리소스 제한] (오라클 무료티어 터짐 방지 🚨)
                # 컨테이너 하나가 메모리를 다 먹어서 서버가 뻗는 걸 막습니다.
                deploy:
                  resources:
                    limits:
                      memory: 1G  # 최대 1GB까지만 사용 (전체 24GB 중 일부 할당)
            
                networks:
                  - msa-network
            
            # 모든 컨테이너가 공유할 네트워크 생성
            networks:
              msa-network:
                driver: bridge
            EOF
            
            # 3. 해당 서비스만 배포 진행
            # 명령어 호환성 체크 (docker-compose vs docker compose)
            if command -v docker-compose &> /dev/null; then
                CMD="docker-compose"
            else
                CMD="docker compose"
            fi
            
            # 최신 이미지 다운로드 (해당 서비스만)
            sudo $CMD pull $SERVICE_NAME
            
            # 컨테이너 재시작 (해당 서비스만)
            sudo $CMD up -d $SERVICE_NAME --remove-orphans
            
            # 4. 안 쓰는 이미지 정리
            sudo docker image prune -f
            
            echo "✅ $SERVICE_NAME 배포 완료!"
