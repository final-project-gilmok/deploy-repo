name: Deploy to OCI (MSA)

on:
  repository_dispatch:
    types: [update-image]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Copy Monitoring Configs to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: "monitoring/"
          target: "~/app"

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          timeout: 300s
          envs: GRAFANA_PASSWORD,GRAFANA_DOMAIN,FRONTEND_URL,DB_URL,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD
          script: |
            set -euo pipefail

            SERVICE_NAME="${{ github.event.client_payload.service_name }}"
            IMAGE_TAG="${{ github.event.client_payload.image_tag }}"

            case "$SERVICE_NAME" in
              gateway-server|api-server|auth-server) ;;
              *) echo "❌ Error: Invalid Service Name ($SERVICE_NAME). Not allowed."; exit 1 ;;
            esac

            if [[ ! "$IMAGE_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "❌ Error: Invalid Image Tag"; exit 1
            fi

            REQUIRED_VARS=(
              "GRAFANA_PASSWORD" "GRAFANA_DOMAIN" "FRONTEND_URL"
              "DB_URL" "DB_USERNAME" "DB_PASSWORD"
              "REDIS_HOST" "REDIS_PORT" "REDIS_PASSWORD"
            )
            for VAR_NAME in "${REQUIRED_VARS[@]}"; do
              if [[ -z "${!VAR_NAME}" ]]; then
                echo "❌ Error: Required env var '$VAR_NAME' is empty."; exit 1
              fi
            done

            echo "🚀 Start Deploy: $SERVICE_NAME (Tag: $IMAGE_TAG)"
            mkdir -p ~/app/nginx/conf.d && cd ~/app

            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE="docker-compose"
            else
              DOCKER_COMPOSE="docker compose"
            fi

            run_compose() {
              sudo sh -c "$DOCKER_COMPOSE $*"
            }

            # ⭐️ Docker 필터로 nginx 정확 매칭 (부분 일치 오탐 방지)
            is_nginx_running() {
              [ "$(sudo docker ps --filter name=^nginx$ --format '{{.Names}}')" = "nginx" ]
            }

            render_nginx_conf() {
              local upstream_host="$1"
              {
                printf 'upstream gateway_backend {\n'
                printf '  server %s:8080;\n' "$upstream_host"
                printf '}\n\n'
                printf 'server {\n'
                printf '  listen 80;\n\n'
                printf '  location / {\n'
                printf '    proxy_pass http://gateway_backend;\n'
                printf '    proxy_set_header Host $host;\n'
                printf '    proxy_set_header X-Real-IP $remote_addr;\n'
                printf '    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n'
                printf '  }\n\n'
                printf '  location /grafana/ {\n'
                printf '    proxy_pass http://grafana:3000/;\n'
                printf '    proxy_set_header Host %s;\n' "$GRAFANA_DOMAIN"
                printf '    proxy_set_header X-Real-IP $remote_addr;\n'
                printf '    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n'
                printf '  }\n'
                printf '}\n'
              } > ./nginx/conf.d/default.conf
            }

            ACTIVE_GATEWAY="gateway-blue"
            if [ -f ./nginx/conf.d/default.conf ] && grep -q "server gateway-green:8080;" ./nginx/conf.d/default.conf; then
              ACTIVE_GATEWAY="gateway-green"
            fi

            if [ ! -f ./nginx/conf.d/default.conf ] || ! grep -q "location /grafana/" ./nginx/conf.d/default.conf; then
              echo "⚙️ Creating Nginx config for $ACTIVE_GATEWAY..."
              render_nginx_conf "$ACTIVE_GATEWAY"
            fi

            echo "🌐 Ensuring docker network 'msa-network' exists..."
            if ! sudo docker network ls --format '{{.Name}}' | grep -wq "^msa-network$"; then
              sudo docker network create msa-network
            fi

            EXISTING_GATEWAY_TAG=""
            EXISTING_API_TAG=""
            EXISTING_AUTH_TAG=""
            if [ -f .env ]; then
              EXISTING_GATEWAY_TAG=$(grep "^GATEWAY_TAG=" .env | cut -d= -f2- || true)
              EXISTING_API_TAG=$(grep "^API_TAG=" .env | cut -d= -f2- || true)
              EXISTING_AUTH_TAG=$(grep "^AUTH_TAG=" .env | cut -d= -f2- || true)
            fi

            printf '%s\n' "GRAFANA_PASSWORD=$GRAFANA_PASSWORD" > .env.tmp
            printf '%s\n' "GRAFANA_DOMAIN=$GRAFANA_DOMAIN" >> .env.tmp
            printf '%s\n' "FRONTEND_URL=$FRONTEND_URL" >> .env.tmp
            printf '%s\n' "DB_URL=$DB_URL" >> .env.tmp
            printf '%s\n' "DB_USERNAME=$DB_USERNAME" >> .env.tmp
            printf '%s\n' "DB_PASSWORD=$DB_PASSWORD" >> .env.tmp
            printf '%s\n' "REDIS_HOST=$REDIS_HOST" >> .env.tmp
            printf '%s\n' "REDIS_PORT=$REDIS_PORT" >> .env.tmp
            printf '%s\n' "REDIS_PASSWORD=$REDIS_PASSWORD" >> .env.tmp

            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
              printf '%s\n' "GATEWAY_TAG=$IMAGE_TAG" >> .env.tmp
              [ -n "$EXISTING_API_TAG" ] && printf '%s\n' "API_TAG=$EXISTING_API_TAG" >> .env.tmp
              [ -n "$EXISTING_AUTH_TAG" ] && printf '%s\n' "AUTH_TAG=$EXISTING_AUTH_TAG" >> .env.tmp
            elif [[ "$SERVICE_NAME" == "api-server" ]]; then
              [ -n "$EXISTING_GATEWAY_TAG" ] && printf '%s\n' "GATEWAY_TAG=$EXISTING_GATEWAY_TAG" >> .env.tmp
              printf '%s\n' "API_TAG=$IMAGE_TAG" >> .env.tmp
              [ -n "$EXISTING_AUTH_TAG" ] && printf '%s\n' "AUTH_TAG=$EXISTING_AUTH_TAG" >> .env.tmp
            elif [[ "$SERVICE_NAME" == "auth-server" ]]; then
              [ -n "$EXISTING_GATEWAY_TAG" ] && printf '%s\n' "GATEWAY_TAG=$EXISTING_GATEWAY_TAG" >> .env.tmp
              [ -n "$EXISTING_API_TAG" ] && printf '%s\n' "API_TAG=$EXISTING_API_TAG" >> .env.tmp
              printf '%s\n' "AUTH_TAG=$IMAGE_TAG" >> .env.tmp
            fi

            mv .env.tmp .env
            chmod 600 .env

            echo "📊 Starting Monitoring System..."
            if [ -d "./monitoring" ]; then
              cd monitoring
              ln -sf ../.env .env
              if [ -f "docker-compose.monitoring.prod.yml" ]; then
                run_compose "-f docker-compose.monitoring.prod.yml up -d"
              elif [ -f "docker-compose.monitoring.yml" ]; then
                run_compose "-f docker-compose.monitoring.yml up -d"
              else
                echo "⚠️ Warning: monitoring compose file not found. Skipping monitoring startup."
              fi
              cd ..
            else
              echo "⚠️ Warning: monitoring folder not found. Skipping."
            fi

            {
              printf 'services:\n'
              printf '  nginx:\n'
              printf '    image: nginx:1.25.4-alpine\n'
              printf '    container_name: nginx\n'
              printf '    ports:\n'
              printf '      - "80:80"\n'
              printf '    volumes:\n'
              printf '      - ./nginx/conf.d:/etc/nginx/conf.d\n'
              printf '    restart: always\n'
              printf '    networks:\n'
              printf '      - msa-network\n\n'
              for COLOR in blue green; do
                printf '  gateway-%s:\n' "$COLOR"
                printf '    image: ghcr.io/final-project-gilmok/gateway-repo:${GATEWAY_TAG:-latest}\n'
                printf '    container_name: gateway-%s\n' "$COLOR"
                printf '    environment:\n'
                printf '      - SERVER_PORT=8080\n'
                printf '      - SPRING_PROFILES_ACTIVE=prod\n'
                printf '      - API_SERVER_URL=http://api-server:8080\n'
                printf '      - AUTH_SERVER_URL=http://auth-server:9000\n'
                printf '      - FRONTEND_URL=${FRONTEND_URL}\n'
                printf '      - SPRING_DATASOURCE_URL=${DB_URL}\n'
                printf '      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}\n'
                printf '      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}\n'
                printf '      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}\n'
                printf '      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}\n'
                printf '      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}\n'
                printf '      - SPRING_DATA_REDIS_SSL_ENABLED=true\n'
                printf '    extra_hosts:\n'
                printf '      - "host.docker.internal:host-gateway"\n'
                printf '    networks:\n'
                printf '      - msa-network\n'
                printf '    healthcheck:\n'
                printf '      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]\n'
                printf '      interval: 10s\n'
                printf '      timeout: 5s\n'
                printf '      retries: 3\n'
                printf '      start_period: 30s\n\n'
              done
              printf '  api-server:\n'
              printf '    image: ghcr.io/final-project-gilmok/api-repo:${API_TAG:-latest}\n'
              printf '    container_name: api-server\n'
              printf '    expose:\n'
              printf '      - "8080"\n'
              printf '    restart: always\n'
              printf '    environment:\n'
              printf '      - TZ=Asia/Seoul\n'
              printf '      - SPRING_PROFILES_ACTIVE=prod\n'
              printf '      - SPRING_DATASOURCE_URL=${DB_URL}\n'
              printf '      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}\n'
              printf '      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}\n'
              printf '      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}\n'
              printf '      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}\n'
              printf '      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}\n'
              printf '      - SPRING_DATA_REDIS_SSL_ENABLED=true\n'
              printf '    networks:\n'
              printf '      - msa-network\n'
              printf '    healthcheck:\n'
              printf '      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]\n'
              printf '      interval: 30s\n'
              printf '      timeout: 10s\n'
              printf '      retries: 3\n'
              printf '      start_period: 30s\n\n'
              printf '  auth-server:\n'
              printf '    image: ghcr.io/final-project-gilmok/auth-repo:${AUTH_TAG:-latest}\n'
              printf '    container_name: auth-server\n'
              printf '    expose:\n'
              printf '      - "9000"\n'
              printf '    restart: always\n'
              printf '    environment:\n'
              printf '      - TZ=Asia/Seoul\n'
              printf '      - SPRING_PROFILES_ACTIVE=prod\n'
              printf '      - SPRING_DATASOURCE_URL=${DB_URL}\n'
              printf '      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}\n'
              printf '      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}\n'
              printf '      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}\n'
              printf '      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}\n'
              printf '      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}\n'
              printf '      - SPRING_DATA_REDIS_SSL_ENABLED=true\n'
              printf '    networks:\n'
              printf '      - msa-network\n'
              printf '    healthcheck:\n'
              printf '      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]\n'
              printf '      interval: 30s\n'
              printf '      timeout: 10s\n'
              printf '      retries: 3\n'
              printf '      start_period: 30s\n\n'
              printf 'networks:\n'
              printf '  msa-network:\n'
              printf '    external: true\n'
            } > docker-compose.yml.tmp
            mv docker-compose.yml.tmp docker-compose.yml

            if [[ "$SERVICE_NAME" == "gateway-server" ]]; then
              echo "🔵 Gateway Blue/Green Deployment..."
              if [ "$ACTIVE_GATEWAY" == "gateway-blue" ]; then
                CURRENT_COLOR="blue"; TARGET_COLOR="green"
              else
                CURRENT_COLOR="green"; TARGET_COLOR="blue"
              fi
              echo "Current: $CURRENT_COLOR / Target: $TARGET_COLOR"

              run_compose "pull gateway-$TARGET_COLOR"
              run_compose "up -d gateway-$TARGET_COLOR"

              echo "Waiting for Health Check..."
              for i in {1..12}; do
                status="$(sudo docker inspect --format='{{.State.Health.Status}}' "gateway-$TARGET_COLOR" 2>/dev/null || echo "starting")"
                if [ "$status" = "healthy" ]; then
                  echo "✅ Health Check Passed!"; break
                fi
                if [ "$status" = "unhealthy" ]; then
                  echo "❌ Container entered unhealthy state. Aborting..."
                  run_compose "stop gateway-$TARGET_COLOR"; exit 1
                fi
                if [ "$i" -eq 12 ]; then
                  echo "❌ Health Check Timed Out. Aborting..."
                  run_compose "stop gateway-$TARGET_COLOR"; exit 1
                fi
                echo "Checking... ($i/12)"; sleep 5
              done

              echo "Switching Traffic to $TARGET_COLOR..."
              cp ./nginx/conf.d/default.conf ./nginx/conf.d/default.conf.bak
              render_nginx_conf "gateway-$TARGET_COLOR"

              # ⭐️ 3곳 모두 is_nginx_running() 함수로 통일
              if is_nginx_running; then
                if ! sudo docker exec nginx nginx -t; then
                  echo "⬅️ Nginx config test failed. Rolling back..."
                  cp ./nginx/conf.d/default.conf.bak ./nginx/conf.d/default.conf
                  exit 1
                fi
                sudo docker exec nginx nginx -s reload
              else
                run_compose "up -d nginx"
                echo "Waiting for nginx to start..."
                for i in {1..6}; do
                  nginx_status="$(sudo docker inspect --format='{{.State.Status}}' nginx 2>/dev/null || echo "unknown")"
                  if [ "$nginx_status" = "running" ]; then
                    echo "✅ Nginx is running."; break
                  elif [ "$nginx_status" = "exited" ] || [ "$nginx_status" = "dead" ]; then
                    echo "❌ Nginx failed to start. Rolling back..."
                    cp ./nginx/conf.d/default.conf.bak ./nginx/conf.d/default.conf
                    exit 1
                  fi
                  if [ "$i" -eq 6 ]; then
                    echo "❌ Nginx did not start in time. Rolling back..."
                    cp ./nginx/conf.d/default.conf.bak ./nginx/conf.d/default.conf
                    exit 1
                  fi
                  echo "Waiting... ($i/6)"; sleep 3
                done
              fi

              echo "Stopping Old Version ($CURRENT_COLOR)..."
              run_compose "stop gateway-$CURRENT_COLOR"

            else
              echo "🟢 Standard Deployment for $SERVICE_NAME..."
              run_compose "pull $SERVICE_NAME"
              run_compose "up -d --remove-orphans $SERVICE_NAME"

              echo "Waiting for Health Check..."
              for i in {1..12}; do
                status="$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$SERVICE_NAME" 2>/dev/null || echo "starting")"
                if [ "$status" = "healthy" ]; then
                  echo "✅ Health Check Passed!"; break
                fi
                if [ "$status" = "unhealthy" ]; then
                  echo "❌ Container entered unhealthy state. Aborting..."; exit 1
                fi
                if [ "$i" -eq 12 ]; then
                  echo "❌ Health Check Timed Out. Aborting..."; exit 1
                fi
                echo "Checking... ($i/12)"; sleep 5
              done

              # ⭐️ else 블록 하단도 is_nginx_running() 함수로 통일
              if ! is_nginx_running; then
                run_compose "up -d nginx"
              fi
            fi

            echo "✨ All Done!"
