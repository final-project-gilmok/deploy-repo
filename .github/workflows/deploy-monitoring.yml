name: Deploy Monitoring to OCI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'monitoring/**'
      - '.github/workflows/deploy-monitoring.yml'

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Copy monitoring configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MONITORING_HOST }}
          username: ${{ secrets.MONITORING_USERNAME }}
          key: ${{ secrets.MONITORING_KEY }}
          source: "monitoring/"
          target: "~/monitoring/"
          strip_components: 1

      - name: Deploy Monitoring Stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
        with:
          host: ${{ secrets.MONITORING_HOST }}
          username: ${{ secrets.MONITORING_USERNAME }}
          key: ${{ secrets.MONITORING_KEY }}
          timeout: 180s
          envs: GRAFANA_PASSWORD,GRAFANA_DOMAIN
          script: |
            set -euo pipefail

            cd ~/monitoring

            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE="docker-compose"
            else
              DOCKER_COMPOSE="docker compose"
            fi

            echo "🌐 Ensuring docker network 'monitoring-network' exists..."
            if ! sudo docker network ls --format '{{.Name}}' | grep -wq "^monitoring-network$"; then
              sudo docker network create monitoring-network
            fi

            umask 077
            cat > .env << EOF
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
            GRAFANA_DOMAIN=${GRAFANA_DOMAIN}
            APP_SERVER_IP=146.56.104.192
            EOF
            chmod 600 .env

            echo "📊 Starting monitoring stack..."
            sudo $DOCKER_COMPOSE -f docker-compose.monitoring.prod.yml pull
            sudo $DOCKER_COMPOSE -f docker-compose.monitoring.prod.yml up -d --remove-orphans

            echo "Waiting for services to be healthy..."
            sleep 10

            for SVC in prometheus grafana loki promtail; do
              STATUS=$(sudo docker inspect --format='{{.State.Status}}' "$SVC" 2>/dev/null || echo "not found")
              if [ "$STATUS" = "running" ]; then
                echo "✅ $SVC is running"
              else
                echo "⚠️  $SVC status: $STATUS"
              fi
            done

            echo "✨ Monitoring Deploy Done!"