version: '3.8'

services:
  # [1] Prometheus: 메트릭 수집기 (버전 고정)
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    # ⭐️ [리뷰 4 반영] ports -> expose (보안)
    expose:
      - "9090"
    networks:
      - msa-network
    restart: always

  # [2] Grafana: 시각화 대시보드 (버전 고정)
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?error_password_missing}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:?error_grafana_domain_missing}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - msa-network
    restart: always
    depends_on:
      - prometheus

  # [3] cAdvisor: 컨테이너 리소스 감시 (신규 레지스트리 및 버전 고정)
  cadvisor:
    image: ghcr.io/google/cadvisor:v0.47.0
    container_name: cadvisor
    # ⭐️ [리뷰 4 반영] ports -> expose (보안)
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - msa-network
    restart: always
    privileged: true
    devices:
      - /dev/kmsg

  # [4] Node Exporter: 호스트 리소스 감시 (버전 고정)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    # ⭐️ [리뷰 4 반영] ports -> expose (보안)
    expose:
      - "9100"
    networks:
      - msa-network
    restart: always

  # [5] Loki (2.9.0)
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    # ⭐️ [리뷰 4 반영] ports -> expose (보안)
    expose:
      - "3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - msa-network
    restart: always

  # [6] Promtail (2.9.0)
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - msa-network
    restart: always

  # [7] Tempo (Distributed Tracing) - NEW!
  tempo:
    image: grafana/tempo:2.3.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./tempo-config.yml:/etc/tempo.yml
      - tempo-data:/var/lib/tempo  # ✅ /tmp/tempo → /var/lib/tempo
    # ⭐️ [리뷰 4 반영] ports -> expose (보안)
    expose:
      - "3200" # Tempo HTTP API
      - "4317" # OTLP gRPC
      - "9411" # Zipkin (Spring Boot가 여기로 보냄)
    networks:
      - msa-network
    restart: always

networks:
  msa-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  tempo-data: # [추가] 데이터 영구 저장용
