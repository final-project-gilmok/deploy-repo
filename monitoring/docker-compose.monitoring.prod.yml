version: '3.8'

services:
  # [1] Prometheus: 메트릭 수집기 (버전 고정)
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - msa-network
    restart: always

  # [2] Grafana: 시각화 대시보드 (버전 고정)
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      # [보안] GitHub Secrets에서 주입된 GRAFANA_PASSWORD 사용 (없으면 에러 발생)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?error_password_missing}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
    networks:
      - msa-network
    restart: always
    depends_on:
      - prometheus

  # [3] cAdvisor: 컨테이너 리소스 감시 (신규 레지스트리 및 버전 고정)
  cadvisor:
    image: ghcr.io/google/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - msa-network
    restart: always
    privileged: true
    devices:
      - /dev/kmsg

  # [4] Node Exporter: 호스트 리소스 감시 (버전 고정)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - msa-network
    restart: always

  # [5] Loki (2.9.0)
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      # [중요] 실제 파일명(.yml)과 일치해야 함
      - ./loki-config.yml:/etc/loki/local-config.yml
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - msa-network
    restart: always

  # [6] Promtail (2.9.0)
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # [중요] 실제 파일명(.yml)과 일치해야 함
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - msa-network
    restart: always

networks:
  msa-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
