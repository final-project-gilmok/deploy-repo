global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'spring-actuator'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: [ '146.56.104.192:8081' ]  # gateway-blue (포트 매핑 필요)
        labels:
          service: 'gateway-blue'
      - targets: [ '146.56.104.192:8082' ]  # gateway-green
        labels:
          service: 'gateway-green'
      - targets: [ '146.56.104.192:8083' ]  # api-server
        labels:
          service: 'api-server'
      - targets: [ '146.56.104.192:9000' ]  # auth-server
        labels:
          service: 'auth-server'

